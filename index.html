  for (const [name, gid] of Object.entries(SHEETS)) {

      const csv = await res.text();
      const parsed = Papa.parse(csv.trim(), { header: true, skipEmptyLines: true });
      
      parsed.data.forEach(row => {
        const assetNum = row['자산번호'] || row['자산 번호'] || '';

  document.getElementById('status').innerText = allData.length + ' devices (' + loadTime + 's) ' + APP_VERSION;

function isRealIssue(text) {
  if (!text || !text.trim()) return false;
  const clean = text.replace(/\s/g, "").toLowerCase();
  for (const ig of IGNORE_TEXT) {
    const cleanIgnore = ig.replace(/\s/g, "").toLowerCase();
    if (clean === cleanIgnore || clean.includes(cleanIgnore)) return false;
  }
  return true;
}

function parseCurrentLocation(row) {
  const val = row['현재위치'] || row['현재 위치'] || '';
  if (!val || !val.trim()) return { location: "미선택", date: null };
  
  const str = val.toString().trim();
  const dateMatch = str.match(/\((\d{1,2})\/(\d{1,2})\)/);
  const date = dateMatch ? dateMatch[1].padStart(2, '0') + '/' + dateMatch[2].padStart(2, '0') : null;
  
  const cleanStr = str.replace(/\(.*?\)/g, '').trim();
  
  let location = "미선택";
  if (cleanStr.includes('아산1')) location = '아산1';
  else if (cleanStr.includes('평택')) location = '평택';
  else if (cleanStr.includes('수원')) location = '수원';
  else if (cleanStr.includes('사무실')) location = '사무실';
  else if (cleanStr.includes('센터')) location = '센터';
  else if (cleanStr.includes('의공실')) location = '의공실';
  else {
    const match = cleanStr.match(/(?:^|[^\d])([1-6])(?:팀|[^\d]|$)/);
    if (match) location = match[1];
  }
  
  return { location, date };
}

function getEquipmentNumber(row) {
  const equipName = row['기기명'] || '';
  const match = equipName.match(/\((\d+)\)/);
  return match ? match[1] : '';
}

function getDetailByDate(row, targetDate) {
  if (!targetDate) return null;
  const dateKeys = Object.keys(row).filter(k => k.match(/^\d{1,2}[\/\-]\d{1,2}$/));
  for (const key of dateKeys) {
    const normalized = key.trim().replace('-', '/').split('/').map(p => p.padStart(2, '0')).join('/');
    if (normalized === targetDate && row[key] && row[key].trim()) {
      return row[key].trim();
    }
  }
  return null;
}

function selectAllEquipment(checked) {
  document.querySelectorAll('.equipment-checkbox').forEach(cb => cb.checked = checked);
}

function showEmailModalWithSelection(location) {
  const selectedCheckboxes = document.querySelectorAll('.equipment-checkbox:checked');
  if (selectedCheckboxes.length === 0) {
    alert('⚠️ 전송할 장비를 선택해주세요!');
    return;
  }
  selectedSender = null;
  currentSenderPage = 1;
  senderSearchQuery = '';
  currentLocation = location;
  const modal = document.getElementById('emailModal');
  renderSenderList(selectedCheckboxes.length);
  modal.style.display = 'block';
}

function renderSenderList(equipmentCount) {
  const senders = Object.keys(EMAIL_SENDERS);
  const filtered = senders.filter(name => name.toLowerCase().includes(senderSearchQuery.toLowerCase()) || EMAIL_SENDERS[name].toLowerCase().includes(senderSearchQuery.toLowerCase()));
  const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
  const startIdx = (currentSenderPage - 1) * ITEMS_PER_PAGE;
  const endIdx = startIdx + ITEMS_PER_PAGE;
  const currentItems = filtered.slice(startIdx, endIdx);
  let html = '<div style="margin-bottom: 20px; font-size: 18px; font-weight: bold; color: #2d3436;">1️⃣ 보내는 사람 선택</div><div style="margin-bottom: 15px; padding: 10px; background: #f0f3ff; border-radius: 8px; color: #0984e3; font-weight: bold;">✓ ' + equipmentCount + '개 장비 선택됨</div><input type="text" class="search-box" placeholder="🔍 이름 또는 이메일 검색..." value="' + senderSearchQuery + '" oninput="senderSearchQuery = this.value; currentSenderPage = 1; renderSenderList(' + equipmentCount + ');">';
  html += currentItems.map(name => '<button class="recipient-btn" onclick="selectSender(\'' + name + '\')">' + name + '<br><small style="color:#636e72;">' + EMAIL_SENDERS[name] + '</small></button>').join('');
  if (totalPages > 1) {
    html += '<div class="pagination">';
    for (let i = 1; i <= totalPages; i++) {
      html += '<button class="page-btn' + (i === currentSenderPage ? ' active' : '') + '" onclick="currentSenderPage = ' + i + '; renderSenderList(' + equipmentCount + ');">' + i + '</button>';
    }
    html += '</div>';
  }
  document.getElementById('recipientList').innerHTML = html;
}

function selectSender(senderName) {
  selectedSender = senderName;
  currentRecipientPage = 1;
  recipientSearchQuery = '';
  renderRecipientList();
}

function renderRecipientList() {
  const recipients = Object.keys(EMAIL_RECIPIENTS);
  const filtered = recipients.filter(name => name.toLowerCase().includes(recipientSearchQuery.toLowerCase()) || EMAIL_RECIPIENTS[name].toLowerCase().includes(recipientSearchQuery.toLowerCase()));
  const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
  const startIdx = (currentRecipientPage - 1) * ITEMS_PER_PAGE;
  const endIdx = startIdx + ITEMS_PER_PAGE;
  const currentItems = filtered.slice(startIdx, endIdx);
  let html = '<div style="margin-bottom: 15px; padding: 10px; background: #e8f5e9; border-radius: 8px; color: #27ae60; font-weight: bold;">📤 보내는 사람: ' + selectedSender + '</div><div style="margin-bottom: 20px; font-size: 18px; font-weight: bold; color: #2d3436;">2️⃣ 받는 사람 선택</div><input type="text" class="search-box" placeholder="🔍 이름 또는 이메일 검색..." value="' + recipientSearchQuery + '" oninput="recipientSearchQuery = this.value; currentRecipientPage = 1; renderRecipientList();">';
  html += currentItems.map(name => '<button class="recipient-btn" onclick="sendEmailWithSelection(\'' + name + '\')">' + name + '<br><small style="color:#636e72;">' + EMAIL_RECIPIENTS[name] + '</small></button>').join('');
  if (totalPages > 1) {
    html += '<div class="pagination">';
    for (let i = 1; i <= totalPages; i++) {
      html += '<button class="page-btn' + (i === currentRecipientPage ? ' active' : '') + '" onclick="currentRecipientPage = ' + i + '; renderRecipientList();">' + i + '</button>';
    }
    html += '</div>';
  }
  document.getElementById('recipientList').innerHTML = html;
}

function closeEmailModal() {
  selectedSender = null;
  currentSenderPage = 1;
  currentRecipientPage = 1;
  senderSearchQuery = '';
  recipientSearchQuery = '';
  document.getElementById('emailModal').style.display = 'none';
}

async function sendEmailWithSelection(recipientName) {
  const recipient = EMAIL_RECIPIENTS[recipientName];
  const sender = EMAIL_SENDERS[selectedSender];
  const senderName = selectedSender;
  const location = currentLocation;
  const locName = /^[1-6]$/.test(location) ? location + '팀' : location;
  
  if (!selectedSender) {
    alert('⚠️ 발신자를 선택해주세요!');
    return;
  }
  
  const selectedCheckboxes = document.querySelectorAll('.equipment-checkbox:checked');
  const selectedEquipment = Array.from(selectedCheckboxes).map(cb => JSON.parse(cb.getAttribute('data-equipment').replace(/&apos;/g, "'")));
  
  if (selectedEquipment.length === 0) {
    alert('⚠️ 전송할 장비를 선택해주세요!');
    return;
  }
  
  // 모달 새로 렌더링
  document.getElementById('recipientList').innerHTML = '<div style="text-align:center; padding:40px;"><div style="font-size:40px;">📧</div><div style="margin-top:20px; font-size:18px; font-weight:bold;">메일 전송 중...</div><div style="margin-top:10px; color:#636e72;">' + selectedEquipment.length + '개 장비</div></div>';
  
  try {
    // 자산번호 제거, 순번만 추가
    const numberedEquipment = selectedEquipment.map((item, index) => ({
      '순번': index + 1,
      '기기명': item['기기명'],
      '모델': item['모델'],
      'S/N': item['제조번호']
    }));
    
    const ws = XLSX.utils.json_to_sheet(numberedEquipment);
    ws['!cols'] = [{ wch: 8 }, { wch: 35 }, { wch: 18 }, { wch: 20 }];
    
    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let R = range.s.r; R <= range.e.r; ++R) {
      for (let C = range.s.c; C <= range.e.c; ++C) {
        const cell_address = XLSX.utils.encode_cell({ r: R, c: C });
        if (!ws[cell_address]) continue;
        if (!ws[cell_address].s) ws[cell_address].s = {};
        ws[cell_address].s = {
          alignment: { horizontal: 'center', vertical: 'center' },
          border: {
            top: { style: 'medium', color: { rgb: '000000' } },
            bottom: { style: 'medium', color: { rgb: '000000' } },
            left: { style: 'medium', color: { rgb: '000000' } },
            right: { style: 'medium', color: { rgb: '000000' } }
          },
          fill: R === 0 ? { fgColor: { rgb: '4CAF50' } } : { fgColor: { rgb: 'FFFFFF' } },
          font: R === 0 ? { bold: true, color: { rgb: 'FFFFFF' }, sz: 12 } : { sz: 11 }
        };
      }
    }
    
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, locName);
    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'base64' });
    const fileName = locName + '_장비목록_' + selectedEquipment.length + '개_' + new Date().toISOString().slice(0, 10) + '.xlsx';
    
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        recipient: recipient,
        sender: sender,
        senderName: senderName,
        locationName: locName,
        excelBase64: wbout,
        fileName: fileName
      })
    });
    
    document.getElementById('recipientList').innerHTML = '<div style="text-align:center; padding:40px;"><div style="font-size:60px;">📨</div><div style="margin-top:20px; font-size:18px; font-weight:bold; color:#00b894;">메일 전송 요청 완료!</div><div style="margin-top:10px; color:#636e72;">' + senderName + ' → ' + recipientName + '<br>' + selectedEquipment.length + '개 장비</div><div style="margin-top:15px; font-size:14px; color:#636e72;">수신자 메일함을 확인해주세요.<br>(스팸함도 확인)</div><button class="download-btn" onclick="closeEmailModal();" style="margin-top:20px;">닫기</button></div>';
    
  } catch (error) {
    document.getElementById('recipientList').innerHTML = '<div style="text-align:center; padding:40px;"><div style="font-size:60px;">❌</div><div style="margin-top:20px; font-size:18px; font-weight:bold; color:#d63031;">전송 실패</div><div style="margin-top:10px; color:#636e72;">' + error.message + '</div><button class="download-btn" onclick="closeEmailModal();" style="margin-top:20px;">닫기</button></div>';
  }
}

function showCalendar() {
  const b = document.getElementById('searchBox');
  
  // 날짜별 특이사항 장비 수집 (중복 제거)
  const dateEquipments = {};
  allData.forEach(r => {
    const data = parseCurrentLocation(r);
    if (data.date) {
      const detail = getDetailByDate(r, data.date);
      if (detail && isRealIssue(detail)) {
        if (!dateEquipments[data.date]) {
          dateEquipments[data.date] = new Set();
        }
        dateEquipments[data.date].add(r._equip);
      }
    }
  });
  
  const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
  const lastDate = new Date(currentYear, currentMonth, 0).getDate();
  let html = '<div class="month-nav"><button onclick="moveMonth(-1)">◀</button><b>' + currentYear + '년 ' + currentMonth + '월</b><button onclick="moveMonth(1)">▶</button></div><div class="calendar">';
  ['일', '월', '화', '수', '목', '금', '토'].forEach(d => { html += '<div class="cal-header">' + d + '</div>'; });
  for (let i = 0; i < firstDay; i++) html += '<div></div>';
  for (let d = 1; d <= lastDate; d++) {
    const dateStr = String(currentMonth).padStart(2, '0') + '/' + String(d).padStart(2, '0');
    const equipSet = dateEquipments[dateStr];
    const equipList = equipSet ? Array.from(equipSet) : [];
    const hasIssue = equipList.length > 0;
    
    let dayContent = d;
    if (hasIssue) {
      dayContent += '<div style="font-size:10px; margin-top:4px; line-height:1.3;">';
      equipList.forEach(eq => {
        const color = EQUIPMENT_COLORS[eq] || '#2d3436';
        dayContent += '<div style="color:' + color + '; font-weight:bold;">' + eq + '</div>';
      });
      dayContent += '</div>';
    }
    
    html += '<div class="cal-day' + (hasIssue ? ' issue' : '') + '" onclick="selectDate(\'' + dateStr + '\', this)">' + dayContent + '</div>';
  }
  html += '</div><div id="dateRes"></div>';
  b.innerHTML = html;
}

function moveMonth(direction) {
  currentMonth += direction;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  else if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  showCalendar();
}

function selectDate(dateStr, element) {
  document.querySelectorAll('.cal-day').forEach(x => x.classList.remove('selected'));
  element.classList.add('selected');
  const found = allData.filter(r => {
    const data = parseCurrentLocation(r);
    if (data.date !== dateStr) return false;
    const detail = getDetailByDate(r, data.date);
    return detail && isRealIssue(detail);
  });
  if (found.length === 0) {
    document.getElementById('dateRes').innerHTML = '<p style="padding:20px; text-align:center;">특이사항 없음</p>';
    return;
  }
  document.getElementById('dateRes').innerHTML = found.map(r => {
    const data = parseCurrentLocation(r);
    const locName = /^[1-6]$/.test(data.location) ? data.location + '팀' : data.location;
    const assetNum = r['자산번호'] || r['자산 번호'] || '';
    const equipNum = getEquipmentNumber(r);
    const equipDisplay = equipNum ? r._equip + '(' + equipNum + ')' : r._equip;
    const detail = getDetailByDate(r, data.date);
    return '<div class="card issue"><div class="card-title">' + locName + ' / ' + equipDisplay + ' / ' + assetNum + '</div><div class="card-note">' + detail + '</div></div>';
  }).join('');
}
